<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base64 Encoder & Decoder — Glassmorphism Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="glass-bg"></div>
    <div class="app-container">
        <header class="app-header">
            <div class="logo-row">
                <span class="logo-emoji">🔗</span>
                <div class="title-col">
                    <h1>Base64 Encoder & Decoder</h1>
                    <p class="tagline">A secure utility to convert plain text to base64 and vice-versa instantly.</p>
                </div>
            </div>
            <div class="badge">utilities</div>
        </header>

        <main class="workspace-card">
            
            <div class="input-group">
                <label>Plain Text Input</label>
                <textarea id="text-input" placeholder="Type raw text here..."></textarea>
            </div>
            <div class="action-row" style="margin: 16px 0; display: flex; gap: 12px; justify-content: center;">
                <button class="btn" id="btn-encode">Encode to Base64 ➜</button>
                <button class="btn btn-secondary" id="btn-decode">‹ Decode from Base64</button>
            </div>
            <div class="input-group">
                <label>Base64 Output</label>
                <textarea id="base64-output" placeholder="Encoded base64 string..."></textarea>
            </div>
        
        </main>
        
        <footer class="app-footer">
            <p>Created as a premium portfolio piece by <a href="https://github.com/VARSHAN69" target="_blank">@VARSHAN69</a></p>
        </footer>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
